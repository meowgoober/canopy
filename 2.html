<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>universal external quiz game answer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #e8408a;
      --pink-bright: #ff5ca8;
      --pink-dim: rgba(232, 64, 138, 0.18);
      --pink-border: rgba(232, 64, 138, 0.45);
      --pink-border-hover: rgba(255, 92, 168, 0.8);
      --bg: #000;
      --s1: #0a0a0a;
      --s2: #111;
      --s3: #1a1a1a;
      --s4: #222;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.1);
      --text: #f2f2f2;
      --muted: #555;
      --muted2: #888;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
    }

    body { display: flex; }

    /* ── Topbar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 58px;
      gap: 16px;
    }

    .topbar-logo {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--text);
      white-space: nowrap;
    }
    .topbar-logo span { color: var(--pink); }

    .topbar-links { display: flex; gap: 6px; }

    .topbar-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted2);
      text-decoration: none;
      padding: 7px 14px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--s2);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      transition: all 0.15s;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .topbar-link:hover {
      border-color: var(--pink-border);
      color: var(--pink-bright);
      background: var(--pink-dim);
    }
    .topbar-link .icon { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── Main content ── */
    .main-content {
      flex: 1;
      min-height: 100vh;
      padding-top: 58px;
    }

    /* ── Hero ── */
    .hero {
      padding: 52px 32px 36px;
      max-width: 860px;
      margin: 0 auto;
      text-align: center;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--pink);
      background: var(--pink-dim);
      border: 1px solid var(--pink-border);
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 22px;
    }
    .hero-eyebrow::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--pink-bright);
    }

    .hero h1 {
      font-size: clamp(34px, 5vw, 52px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 10px;
    }
    .hero h1 span { color: var(--pink); }

    .hero p {
      color: var(--muted2);
      font-size: 14px;
      margin-top: 8px;
    }

    /* ── Card sections ── */
    .content-section {
      padding: 0 32px 60px;
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: var(--s1);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 24px 28px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 14px;
    }

    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 18px 0;
    }

    /* ── Inputs ── */
    .field-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .styled-input {
      flex: 1;
      min-width: 180px;
      padding: 11px 14px;
      background: var(--s2);
      border: 1px solid var(--border2);
      border-radius: 9px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .styled-input::placeholder { color: var(--muted); }
    .styled-input:focus {
      border-color: var(--pink-border-hover);
      box-shadow: 0 0 0 3px rgba(232, 64, 138, 0.12);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: 9px;
      border: 1px solid var(--pink-border);
      background: var(--pink-dim);
      color: var(--pink-bright);
      font-size: 13px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:hover {
      background: var(--pink);
      border-color: var(--pink);
      color: #fff;
    }
    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .btn-ghost {
      background: var(--s2);
      border-color: var(--border);
      color: var(--muted2);
    }
    .btn-ghost:hover {
      border-color: var(--pink-border);
      color: var(--pink-bright);
      background: var(--pink-dim);
    }
    .btn-solid {
      background: var(--pink);
      border-color: var(--pink);
      color: #fff;
    }
    .btn-solid:hover { background: var(--pink-bright); border-color: var(--pink-bright); }

    /* ── Status badge ── */
    .status-bar {
      font-size: 12px;
      color: var(--muted2);
      margin-top: 10px;
    }
    .status-bar.ok { color: #4ade80; }

    /* ── Video preview ── */
    #screenVideo {
      display: none;
      width: 100%;
      max-width: 560px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      margin-top: 14px;
      background: var(--s2);
    }

    /* ── Toggle row ── */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted2);
    }
    .toggle-row input[type="checkbox"] {
      accent-color: var(--pink);
      width: 15px; height: 15px;
      cursor: pointer;
    }

    /* ── Answer textarea ── */
    #answerBox {
      width: 100%;
      padding: 14px;
      background: var(--s2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      min-height: 130px;
    }
    #answerBox:focus {
      border-color: var(--pink-border-hover);
      box-shadow: 0 0 0 3px rgba(232, 64, 138, 0.12);
    }

    /* ── Fun footer ── */
    .fun-footer {
      text-align: center;
      padding: 0 32px 48px;
      color: var(--muted);
      font-size: 13px;
    }
    .fun-footer img {
      display: block;
      margin: 10px auto 0;
      border-radius: 10px;
      opacity: 0.85;
    }

    @media (max-width: 700px) {
      .topbar { padding: 0 16px; }
      .topbar-link span { display: none; }
      .hero, .content-section { padding-left: 18px; padding-right: 18px; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>

<div class="main-content">

  <nav class="topbar">
    <div class="topbar-logo">Canopy<span>Company</span></div>
    <div class="topbar-links">
      <a href="https://console.groq.com/keys" target="_blank" class="topbar-link">
        <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="12" height="8" rx="2"/>
          <path d="M5 7V5a3 3 0 0 1 6 0v2"/>
        </svg>
        <span>Get API Key</span>
      </a>
      <a href="https://discord.gg/a3SAvnBb6x" target="_blank" class="topbar-link">
        <svg class="icon" viewBox="0 0 16 16" fill="currentColor">
          <path d="M13.5 2.3A13 13 0 0 0 10.2 1c-.15.26-.3.6-.4.87a12 12 0 0 0-3.6 0A9.5 9.5 0 0 0 5.8 1 13 13 0 0 0 2.5 2.3C.36 5.44-.22 8.5.07 11.5a13.1 13.1 0 0 0 4 2.02c.33-.44.62-.91.87-1.4a8.4 8.4 0 0 1-1.37-.66l.33-.26a9.4 9.4 0 0 0 8.2 0l.33.26c-.44.26-.9.48-1.37.66.25.49.54.96.87 1.4a13 13 0 0 0 4-2.02c.33-3.42-.56-6.45-2.43-9.16zM5.35 9.67c-.78 0-1.42-.71-1.42-1.58s.62-1.58 1.42-1.58 1.44.71 1.42 1.58c0 .87-.62 1.58-1.42 1.58zm5.3 0c-.78 0-1.42-.71-1.42-1.58s.62-1.58 1.42-1.58 1.44.71 1.42 1.58c0 .87-.62 1.58-1.42 1.58z"/>
        </svg>
        <span>Discord</span>
      </a>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">powered by llama 4 scout on groq</div>
    <h1>Universal <span>Quiz Answer</span></h1>
    <p>Share your screen, hit get answers — done.</p>
  </div>

  <div class="content-section">

    <!-- Step 1: API Key -->
    <div class="card">
      <div class="card-label">Step 1 — Groq API Key</div>
      <div class="field-row">
        <input class="styled-input" type="password" id="apiKeyInput" placeholder="gsk_..." />
        <button class="btn btn-solid" onclick="saveKey()">Save Key</button>
        <button class="btn btn-ghost" onclick="usePublicKey()">Use Public Key</button>
      </div>
      <div class="status-bar ok" id="keySaved" style="display:none;">✓ Key saved.</div>
      <div class="status-bar" style="margin-top:8px;">
        Get a free key at <a href="https://console.groq.com/keys" target="_blank" style="color:var(--pink); text-decoration:none;">console.groq.com/keys</a>
      </div>
    </div>

    <!-- Step 2: Screen Share -->
    <div class="card">
      <div class="card-label">Step 2 — Share Your Screen</div>
      <button class="btn btn-ghost" onclick="startCapture()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="14" height="10" rx="2"/>
          <path d="M5 14h6M8 13v1"/>
        </svg>
        Select Screen / Window
      </button>
      <video id="screenVideo" autoplay muted playsinline></video>
      <div class="status-bar" id="statusBar">Ready.</div>
    </div>

    <!-- Step 3: Answer -->
    <div class="card">
      <div class="card-label">Step 3 — Get the Answer</div>

      <div class="toggle-row" style="margin-bottom:10px;">
        <input type="checkbox" id="keybindToggle" onchange="toggleKeybind()">
        <label for="keybindToggle">Enable Tab keybind</label>
      </div>
      <div class="toggle-row" style="margin-bottom:16px;">
        <input type="checkbox" id="inactivityToggle" onchange="toggleInactivity()">
        <label for="inactivityToggle">Auto-answer when unfocused every</label>
        <input type="number" id="inactivitySeconds" value="8" min="1" max="999"
          style="width:58px; padding:5px 8px; background:var(--s2); border:1px solid var(--border2);
                 border-radius:7px; color:var(--text); font-size:13px; font-family:'Inter',sans-serif;
                 outline:none; text-align:center;"
          onfocus="this.style.borderColor='var(--pink-border-hover)'"
          onblur="this.style.borderColor='var(--border2)'" />
        <label>seconds</label>
      </div>

      <textarea id="answerBox" readonly placeholder="Answer will appear here..."></textarea>

      <div style="margin-top:12px;">
        <button class="btn btn-solid" onclick="getAnswer()" id="answerBtn" disabled>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="6.5"/>
            <path d="M8 5v3.5l2 2"/>
          </svg>
          Get Answers
        </button>
      </div>
    </div>

  </div>

  <div class="fun-footer">
    burger 🤤
    <img src="https://i.postimg.cc/qqbJhtTr/Burger-King-Angus-Bacon-Cheese-Steak-Burger.png" width="90" />
  </div>

</div>

<canvas id="captureCanvas" style="display:none;"></canvas>

<script>
  let apiKey = '';
  let mediaStream = null;
  let inactivityInterval = null;
  let inactivityEnabled = false;

  function toggleInactivity() {
    inactivityEnabled = document.getElementById('inactivityToggle').checked;
    if (!inactivityEnabled) {
      clearInterval(inactivityInterval);
      inactivityInterval = null;
    }
  }

  function startInactivityTimer() {
    if (!inactivityEnabled) return;
    clearInterval(inactivityInterval);
    const secs = Math.max(1, parseInt(document.getElementById('inactivitySeconds').value) || 8);
    inactivityInterval = setInterval(() => {
      const btn = document.getElementById('answerBtn');
      if (!btn.disabled) getAnswer();
    }, secs * 1000);
  }

  function stopInactivityTimer() {
    clearInterval(inactivityInterval);
    inactivityInterval = null;
  }

  document.addEventListener('visibilitychange', () => {
    if (!inactivityEnabled) return;
    document.hidden ? startInactivityTimer() : stopInactivityTimer();
  });

  window.addEventListener('blur', () => {
    if (!inactivityEnabled) return;
    startInactivityTimer();
  });

  window.addEventListener('focus', () => {
    stopInactivityTimer();
  });

  function usePublicKey() {
    const pub = atob('Z3NrX2ZLT2xocGQ4YmRGS0Jkdm9KZTFzV0dkeWIzRllqNndTa1pUa21sSDZxeVlXTlBWWjVRZ1k=');
    document.getElementById('apiKeyInput').value = pub;
    apiKey = pub;
    document.getElementById('keySaved').style.display = 'inline';
    setStatus('Public key applied. Now share your screen.');
  }

  function saveKey() {
    const val = document.getElementById('apiKeyInput').value.trim();
    if (!val) { alert('Enter your Groq API key first.'); return; }
    apiKey = val;
    document.getElementById('keySaved').style.display = 'inline';
    setStatus('Key saved. Now share your screen.');
  }

  async function startCapture() {
    try {
      if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
      mediaStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' }, audio: false });
      const video = document.getElementById('screenVideo');
      video.srcObject = mediaStream;
      video.style.display = 'block';
      document.getElementById('answerBtn').disabled = false;
      setStatus('Screen shared. Click "Get Answers" when ready.');
      const track = mediaStream.getVideoTracks()[0];
      video.onloadedmetadata = () => startFrameLoop(track);
      track.addEventListener('ended', () => {
        stopFrameLoop();
        video.style.display = 'none';
        document.getElementById('answerBtn').disabled = true;
        mediaStream = null;
        setStatus('Screen share ended.');
      });
    } catch (e) {
      setStatus(e.name === 'NotAllowedError' ? 'Cancelled.' : 'Error: ' + e.message);
    }
  }

  let isFetching = false;

  let frameLoop = null;

  function startFrameLoop(track) {
    stopFrameLoop();
    const canvas = document.getElementById('captureCanvas');
    const ctx = canvas.getContext('2d');

    // Use MediaStreamTrackProcessor if available (Chrome 94+) — unaffected by tab visibility throttling
    if (typeof MediaStreamTrackProcessor !== 'undefined') {
      const processor = new MediaStreamTrackProcessor({ track });
      const reader = processor.readable.getReader();
      let active = true;
      frameLoop = { stop: () => { active = false; reader.cancel(); } };
      (async () => {
        while (active) {
          const { done, value } = await reader.read();
          if (done || !active) break;
          canvas.width = value.displayWidth || value.codedWidth;
          canvas.height = value.displayHeight || value.codedHeight;
          ctx.drawImage(value, 0, 0);
          value.close();
        }
      })();
      return;
    }

    // Fallback: requestAnimationFrame loop against the video element
    const video = document.getElementById('screenVideo');
    let rafId;
    function tick() {
      if (video.readyState >= 2) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
      }
      rafId = requestAnimationFrame(tick);
    }
    rafId = requestAnimationFrame(tick);
    frameLoop = { stop: () => cancelAnimationFrame(rafId) };
  }

  function stopFrameLoop() {
    if (frameLoop) { frameLoop.stop(); frameLoop = null; }
  }

  function captureFrame() {
    // Canvas is kept current by the frame loop — just snapshot it
    return document.getElementById('captureCanvas').toDataURL('image/jpeg', 0.85);
  }

  async function getAnswer() {
    if (!apiKey) { alert('Save your Groq API key first.'); return; }
    if (!mediaStream) { alert('Share your screen first.'); return; }
    if (isFetching) return;

    isFetching = true;
    const btn = document.getElementById('answerBtn');
    btn.disabled = true;
    btn.textContent = 'Thinking...';
    setStatus('Sending to Llama 4 Scout...');

    const dataUrl = captureFrame();
    const base64 = dataUrl.split(',')[1];

    if (base64.length * 0.75 > 3.8 * 1024 * 1024) {
      setStatus('Screenshot too large. Try sharing a single window instead of full screen.');
      btn.disabled = false;
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.5"/><path d="M8 5v3.5l2 2"/></svg> Get Answers';
      return;
    }

    document.getElementById('answerBox').value = '...';

    try {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'meta-llama/llama-4-scout-17b-16e-instruct',
          max_tokens: 1024,
          temperature: 0.6,
          messages: [{
            role: 'user',
            content: [
              { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${base64}` } },
              { type: 'text', text: `look at this quiz question and reply with only the correct answer. no explanation, no punctuation, no markdown, just the answer text. (ref:${Date.now()})` }
            ]
          }]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      const text = data?.choices?.[0]?.message?.content;
      document.getElementById('answerBox').value = text || 'No response received.';
      setStatus('Done.');
    } catch (e) {
      document.getElementById('answerBox').value = 'Error: ' + e.message;
      setStatus('Request failed. Check your API key.');
    } finally {
      isFetching = false;
      btn.disabled = false;
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.5"/><path d="M8 5v3.5l2 2"/></svg> Get Answers';
    }
  }

  function tabKeybind(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const btn = document.getElementById('answerBtn');
      if (!btn.disabled) getAnswer();
    }
  }

  function toggleKeybind() {
    if (document.getElementById('keybindToggle').checked) {
      document.addEventListener('keydown', tabKeybind, true);
    } else {
      document.removeEventListener('keydown', tabKeybind, true);
    }
  }

  function setStatus(msg) {
    document.getElementById('statusBar').textContent = msg;
  }
</script>
</body>
</html>
